<svg width="1200" height="320" viewBox="0 0 1200 320" fill="none" xmlns="http://www.w3.org/2000/svg">

  <defs>

    <!-- Background -->
    <linearGradient id="bgGradient" x1="0" y1="0" x2="1200" y2="320">
      <stop offset="0%" stop-color="#050816"/>
      <stop offset="50%" stop-color="#0B1220"/>
      <stop offset="100%" stop-color="#132B45"/>
    </linearGradient>

    <!-- Accent -->
    <linearGradient id="accentGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#58A6FF"/>
      <stop offset="100%" stop-color="#00E5FF"/>
    </linearGradient>

    <!-- Glow -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Soft Glow -->
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="12" result="blur"/>
    </filter>

    <!-- Grid -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40"
            fill="none"
            stroke="rgba(255,255,255,0.04)"
            stroke-width="1"/>
    </pattern>

    <!-- Scanline -->
    <linearGradient id="scanLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="50%" stop-color="#58A6FF"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>

  </defs>

  <!-- Background -->
  <rect width="1200" height="320" fill="url(#bgGradient)"/>

  <!-- Grid -->
  <rect width="1200" height="320" fill="url(#grid)" opacity="0.35"/>

  <!-- Ambient glow -->
  <circle cx="980" cy="50" r="170" fill="#00D4FF" opacity="0.08" filter="url(#softGlow)"/>
  <circle cx="240" cy="300" r="120" fill="#7B68EE" opacity="0.10" filter="url(#softGlow)"/>

  <!-- Animated scan line -->
  <rect x="-200" y="0" width="400" height="2"
        fill="url(#scanLine)"
        opacity="0.45">
    <animate attributeName="y"
             values="0;320;0"
             dur="7s"
             repeatCount="indefinite"/>
  </rect>

  <!-- Decorative lines -->
  <line x1="60" y1="65" x2="470" y2="65"
        stroke="url(#accentGradient)"
        stroke-width="2"
        opacity="0.7"/>

  <line x1="60" y1="255" x2="390" y2="255"
        stroke="url(#accentGradient)"
        stroke-width="1"
        opacity="0.4"/>

  <!-- Main Title -->
  <text x="70" y="140"
        font-family="Segoe UI, Arial, sans-serif"
        font-size="74"
        font-weight="700"
        fill="#FFFFFF"
        letter-spacing="3"
        filter="url(#glow)">
    Taka10
  </text>

  <!-- Subtitle -->
  <text x="75" y="182"
        font-family="Consolas, monospace"
        font-size="24"
        fill="#58A6FF">
    Unity Developer / Gameplay Designer
  </text>

  <text x="75" y="214"
        font-family="Consolas, monospace"
        font-size="17"
        fill="#D2E3FF">
    UX Research ・ Web Development
  </text>

  <text x="75" y="242"
        font-family="Consolas, monospace"
        font-size="17"
        fill="#8B949E">
    Graduate Student in Kyoto
  </text>

  <!-- Terminal Window -->
  <g filter="url(#glow)">

    <rect x="700" y="42"
          width="430"
          height="220"
          rx="20"
          fill="#0D1117"
          fill-opacity="0.88"
          stroke="#58A6FF"
          stroke-opacity="0.5"
          stroke-width="1.5"/>

    <!-- Header -->
    <rect x="700" y="42"
          width="430"
          height="36"
          rx="20"
          fill="#111827"/>

    <circle cx="726" cy="60" r="5" fill="#FF5F56"/>
    <circle cx="746" cy="60" r="5" fill="#FFBD2E"/>
    <circle cx="766" cy="60" r="5" fill="#27C93F"/>

    <text x="820" y="65"
          font-family="Consolas, monospace"
          font-size="13"
          fill="#8B949E">
      taka10_profile.exe
    </text>

    <!-- Terminal text -->
    <text x="725" y="112"
          font-family="Consolas, monospace"
          font-size="17"
          fill="#58A6FF">
      > initializing system...
    </text>

    <text x="725" y="145"
          font-family="Consolas, monospace"
          font-size="17"
          fill="#FFFFFF">
      > Unity Engine connected
    </text>

    <text x="725" y="178"
          font-family="Consolas, monospace"
          font-size="17"
          fill="#7B68EE">
      > UX research module loaded
    </text>

    <text x="725" y="211"
          font-family="Consolas, monospace"
          font-size="17"
          fill="#00D4FF">
      > AI interaction ready
    </text>

    <text x="725" y="244"
          font-family="Consolas, monospace"
          font-size="17"
          fill="#27C93F">
      > STATUS : ONLINE_
      <animate attributeName="opacity"
               values="1;0.3;1"
               dur="1s"
               repeatCount="indefinite"/>
    </text>

  </g>

</svg>
